<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Нет соединения</title>
  <style>
    :root{--bg:#0e0e11;--fg:#e8e8ea;--muted:#9a9aa2;--accent:#c62828}
    html,body{margin:0;height:100%}
    body{background:var(--bg);color:var(--fg);
      font-family:-apple-system,Roboto,"Segoe UI",sans-serif;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:24px;box-sizing:border-box}
    .logo{width:96px;height:96px;margin-bottom:20px;opacity:.9}
    h1{font-size:20px;margin:0 0 10px}
    p{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 26px;max-width:320px}
    button{background:var(--accent);color:#fff;border:0;border-radius:12px;
      font-size:16px;font-weight:600;padding:14px 34px;cursor:pointer}
    button:active{opacity:.85}
    .hint{margin-top:18px;font-size:12px;color:var(--muted);max-width:300px}
  </style>
</head>
<body>
  <img class="logo" src="assets/logo.png" alt="" onerror="this.style.display='none'">
  <h1>Не удалось открыть сайт</h1>
  <p>Нет соединения с triada-mendeleeva.ru. Проверьте интернет.
     Если включён VPN — попробуйте выключить его и повторить.</p>
  <button onclick="retry()">Повторить</button>
  <div class="hint">Сайт: triada-mendeleeva.ru</div>
  <script>
    function retry(){ window.location.href = 'https://triada-mendeleeva.ru/'; }
  </script>
</body>
</html>
